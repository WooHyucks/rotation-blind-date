<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>로테이션 소개팅 데모</title>
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Critical Inline CSS for immediate spinner rendering -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #FFE5E1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .spinner-container {
        position: relative;
        padding: 32px;
        background-color: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid white;
        border-radius: 48px;
        box-shadow: 0 20px 50px rgba(251, 113, 133, 0.1);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(251, 113, 133, 0.1);
        border-left-color: #f43f5e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        text-align: center;
        font-family: sans-serif;
      }
      .loader-title {
        font-weight: 900;
        letter-spacing: -0.05em;
        font-size: 20px;
        color: #1c1917;
        margin-bottom: 4px;
      }
      .loader-sub {
        font-weight: 900;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: rgba(159, 18, 57, 0.4);
        text-transform: uppercase;
      }
      .loader-hide {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Immediate Loading Spinner (Priority #1) -->
    <div id="initial-loader">
      <div class="spinner-container">
        <div class="spinner"></div>
      </div>
      <div class="loader-text">
        <div class="loader-title">LOADING</div>
        <div class="loader-sub">ROTATION DEMO</div>
      </div>
    </div>

    <div id="root"></div>
    <!-- Script with type='module' is deferred by default in modern browsers -->
    <script defer type="module" src="/src/main.tsx"></script>
  </body>
</html>
